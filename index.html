<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://jz-sys.github.io/renchin-card/base/favicon.png" type="image/png">
    <title>Renchin | LINE 名片</title>
    <link rel="icon" href="icon.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        .sketch-border {
            border: 3px solid #3f3f46;
            border-radius: 2px 255px 3px 25px / 255px 5px 225px 3px;
        }
        .sketch-shadow {
            box-shadow: 4px 4px 0px 0px rgba(63, 63, 70, 1);
        }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#FFFDF7] flex flex-col items-center justify-start min-h-screen p-4 font-sans text-zinc-800">

    <div class="sketch-border sketch-shadow w-full max-w-sm relative flex flex-col h-[85vh] max-h-[700px] overflow-hidden">
        <div id="render-bg" class="absolute inset-0 bg-cover bg-center z-0"></div>
        <div class="absolute inset-0 bg-[#FFFDF7]/85 z-10"></div>

        <div class="p-5 flex-1 overflow-y-auto relative z-20 flex flex-col">
            
            <div class="flex justify-center space-x-2 mb-5 shrink-0">
                <button id="btn-tab-profile" onclick="switchPage('profile')" class="flex-1 py-1.5 sketch-border bg-zinc-800 text-white font-bold text-sm transition-all"></button>
                <button id="btn-tab-products" onclick="switchPage('products')" class="flex-1 py-1.5 sketch-border bg-white text-zinc-800 font-bold text-sm transition-all"></button>
            </div>

            <div id="page-profile" class="flex flex-col items-center">
                <div class="relative flex items-center justify-center shrink-0 w-[120px] h-[120px]">
                    <div id="render-avatar" class="w-24 h-24 sketch-border bg-cover bg-center shadow-md bg-white z-10"></div>
                    <div id="render-avatar-frame" class="absolute inset-0 bg-contain bg-center bg-no-repeat z-20 pointer-events-none hidden"></div>
                </div>

                <h1 id="render-name" class="text-xl font-black mt-4 text-zinc-800"></h1>
                <p id="render-title" class="text-sm font-bold mt-1 text-[#FF6B6B]"></p>
                <p id="render-bio" class="text-xs text-zinc-600 text-center mt-3 px-3 leading-relaxed">載入中...</p>
                <div id="render-links" class="mt-6 space-y-3 w-full"></div>
            </div>

            <div id="page-products" class="hidden flex-col w-full pb-2">
                </div>
        </div>

        <div class="p-4 border-t-3 border-zinc-800 bg-[#FFFDF7] relative z-20 shrink-0">
            <div class="grid grid-cols-2 gap-3">
                <button id="btn-share" class="flex items-center justify-center gap-2 py-2.5 sketch-border sketch-shadow font-bold text-sm bg-zinc-800 text-white active:translate-y-1 active:shadow-none transition-all"></button>
                <button id="btn-close" class="flex items-center justify-center gap-2 py-2.5 bg-white sketch-border font-bold text-sm active:translate-y-1 transition-all"></button>
            </div>
            <div id="render-footer" class="mt-3 text-center text-[10px] text-zinc-400 font-medium tracking-wide"></div>
        </div>
    </div>

    <script>
        // ⚠️ 1. 記得補上你的 LIFF ID
        const MY_LIFF_ID = "2010359676-IbNfBMDD"; 
        const MY_LIFF_URL = `https://liff.line.me/${MY_LIFF_ID}`;

        let cardData = {};

        window.onload = function() {
            // ⚠️ 2. 記得改為你的 GitHub 絕對網址
            fetch('https://jz-sys.github.io/renchin-card/card.json')
                .then(res => {
                    if (!res.ok) throw new Error("找不到檔案");
                    return res.json(); 
                })
                .then(data => {
                    cardData = data; 
                    renderHtmlCard();
                    initializeLiff();
                })
                .catch(err => {
                    document.getElementById('render-bio').innerText = "無法載入資料，請確認 card.json";
                });
        };

        // 切換分頁邏輯
        function switchPage(page) {
            const pageProfile = document.getElementById('page-profile');
            const pageProducts = document.getElementById('page-products');
            const btnProfile = document.getElementById('btn-tab-profile');
            const btnProducts = document.getElementById('btn-tab-products');

            if (page === 'profile') {
                pageProfile.classList.remove('hidden');
                pageProfile.classList.add('flex');
                pageProducts.classList.add('hidden');
                pageProducts.classList.remove('flex');
                
                btnProfile.classList.replace('bg-white', 'bg-zinc-800');
                btnProfile.classList.replace('text-zinc-800', 'text-white');
                btnProducts.classList.replace('bg-zinc-800', 'bg-white');
                btnProducts.classList.replace('text-white', 'text-zinc-800');
            } else {
                pageProfile.classList.add('hidden');
                pageProfile.classList.remove('flex');
                pageProducts.classList.remove('hidden');
                pageProducts.classList.add('flex');

                btnProducts.classList.replace('bg-white', 'bg-zinc-800');
                btnProducts.classList.replace('text-zinc-800', 'text-white');
                btnProfile.classList.replace('bg-zinc-800', 'bg-white');
                btnProfile.classList.replace('text-white', 'text-zinc-800');
            }
        }

        // 渲染畫面的主要邏輯
        function renderHtmlCard() {
            // 渲染背景與頭像
            document.getElementById('render-bg').style.backgroundImage = `url('${cardData.images.backgroundUrl}')`;
            document.getElementById('render-avatar').style.backgroundImage = `url('${cardData.images.avatarUrl}')`;
            
            // 渲染頭像外框
            const avatarFrame = document.getElementById('render-avatar-frame');
            if (cardData.images.avatarFrameUrl && cardData.images.avatarFrameUrl !== '') {
                avatarFrame.style.backgroundImage = `url('${cardData.images.avatarFrameUrl}')`;
                avatarFrame.classList.remove('hidden');
            } else {
                avatarFrame.classList.add('hidden');
            }

            // 渲染基本文字
            document.getElementById('render-name').innerText = cardData.profile.name;
            document.getElementById('render-title').innerText = cardData.profile.title;
            document.getElementById('render-bio').innerText = cardData.profile.bio;
            document.getElementById('render-footer').innerText = cardData.footerText;
            document.getElementById('btn-tab-profile').innerText = cardData.buttons.tabProfile;
            document.getElementById('btn-tab-products').innerText = cardData.buttons.tabProducts;

            // 渲染底部按鈕 (帶有自訂小圖示)
            let shareIconHtml = (cardData.buttons.htmlShareBtnIcon && cardData.buttons.htmlShareBtnIcon !== '') 
                ? `<img src="${cardData.buttons.htmlShareBtnIcon}" class="w-4 h-4 object-contain invert" alt="share">` : '';
            document.getElementById('btn-share').innerHTML = `${shareIconHtml}<span>${cardData.buttons.htmlShareBtn}</span>`;

            let closeIconHtml = (cardData.buttons.htmlCloseBtnIcon && cardData.buttons.htmlCloseBtnIcon !== '') 
                ? `<img src="${cardData.buttons.htmlCloseBtnIcon}" class="w-4 h-4 object-contain" alt="close">` : '';
            document.getElementById('btn-close').innerHTML = `${closeIconHtml}<span>${cardData.buttons.htmlCloseBtn}</span>`;

            // 渲染社群連結 (帶有自訂小圖示)
            const linksContainer = document.getElementById('render-links');
            linksContainer.innerHTML = ''; 
            cardData.links.forEach(link => {
                const a = document.createElement('a');
                a.href = link.url;
                a.target = "_blank";
                a.className = "flex items-center justify-center w-full py-3 sketch-border text-sm font-bold text-zinc-800 bg-white/90 backdrop-blur-sm transition active:translate-y-0.5 active:bg-zinc-100 gap-2";
                
                let iconHtml = (link.customIcon && link.customIcon !== '') 
                    ? `<img src="${link.customIcon}" class="w-5 h-5 object-contain" alt="icon">` : '';
                a.innerHTML = `${iconHtml}<span>${link.title}</span>`;
                
                linksContainer.appendChild(a);
            });

            // 渲染商品分區 (支援標題小圖示)
            const productsContainer = document.getElementById('page-products');
            productsContainer.innerHTML = ''; 
            
            if (cardData.portfolioGroups) {
                cardData.portfolioGroups.forEach(group => {
                    // 生成分區標題
                    const titleElement = document.createElement('h2');
                    titleElement.className = "flex items-center justify-center w-full font-black text-zinc-800 text-[13px] mt-4 mb-3 tracking-widest text-[#FF6B6B] gap-2";
                    
                    let sectionIconHtml = (group.sectionIcon && group.sectionIcon !== '') 
                        ? `<img src="${group.sectionIcon}" class="w-5 h-5 object-contain" alt="section-icon">` : '';
                    titleElement.innerHTML = `${sectionIconHtml}<span>- ${group.sectionTitle} -</span>`;
                    productsContainer.appendChild(titleElement);

                    // 生成網格
                    const gridDiv = document.createElement('div');
                    gridDiv.className = "grid grid-cols-2 gap-3 mb-4 w-full";

                    group.items.forEach(item => {
                        const isLink = item.type === 'link' && item.url !== '';
                        const cardElement = document.createElement(isLink ? 'a' : 'div');
                        let baseClass = "flex flex-col sketch-border bg-white/90 p-2 h-full ";
                        
                        if (isLink) {
                            cardElement.href = item.url;
                            cardElement.target = "_blank";
                            cardElement.className = baseClass + "cursor-pointer transition active:translate-y-1 active:bg-zinc-100 hover:shadow-md";
                        } else {
                            cardElement.className = baseClass;
                        }

                        cardElement.innerHTML = `
                            <div class="w-full aspect-square bg-cover bg-center sketch-border mb-2" style="background-image: url('${item.imageUrl}')"></div>
                            <h3 class="font-bold text-[13px] text-zinc-800 leading-tight truncate">${item.title}</h3>
                            <p class="text-[11px] text-[#FF6B6B] font-bold mt-1 truncate">${item.desc}</p>
                        `;
                        gridDiv.appendChild(cardElement);
                    });
                    productsContainer.appendChild(gridDiv);
                });
            }
        }

        // 發送 Flex Message 邏輯保持不變
        function initializeLiff() {
            liff.init({ liffId: MY_LIFF_ID }).then(() => {
                if (!liff.isLoggedIn()) liff.login();
                document.getElementById('btn-share').onclick = function() {
                    if (liff.isApiAvailable('shareTargetPicker')) shareDynamicFlexMessage();
                };
                document.getElementById('btn-close').onclick = function() {
                    if (liff.isInClient()) liff.closeWindow();
                };
            });
        }

        function shareDynamicFlexMessage() {
            const flexJson = {
                "type": "flex", "altText": `收到來自 ${cardData.profile.name} 的名片`,
                "contents": {
                    "type": "bubble", "size": "mega",
                    "body": {
                        "type": "box", "layout": "vertical", "paddingAll": "0px",
                        "contents": [
                            { "type": "image", "url": cardData.images.backgroundUrl, "size": "full", "aspectMode": "cover", "aspectRatio": "3:4" },
                            {
                                "type": "box", "layout": "vertical", "position": "absolute", "width": "100%", "height": "100%", "backgroundColor": "#FFFDF7DD", "paddingAll": "25px", "alignItems": "center",
                                "contents": [
                                    { "type": "image", "url": cardData.images.avatarUrl, "size": "xl", "aspectMode": "cover", "margin": "xl" },
                                    { "type": "text", "text": cardData.profile.name, "weight": "bold", "size": "xl", "color": "#3f3f46", "margin": "xl" },
                                    { "type": "text", "text": cardData.profile.title, "size": "sm", "color": "#FF6B6B", "weight": "bold", "margin": "sm" },
                                    { "type": "text", "text": cardData.profile.bio, "size": "sm", "color": "#71717a", "wrap": true, "margin": "xl", "align": "center" },
                                    { "type": "box", "layout": "vertical", "margin": "xxl", "contents": [ { "type": "button", "style": "primary", "color": "#3f3f46", "action": { "type": "uri", "label": cardData.buttons.flexOpenBtn, "uri": MY_LIFF_URL } } ] }
                                ]
                            }
                        ]
                    }
                }
            };
            liff.shareTargetPicker([ flexJson ]).then(res => { if (res) console.log("發送成功"); });
        }
    </script>
</body>
</html>
