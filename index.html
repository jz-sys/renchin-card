<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全幅背景動態名片</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    
    <style>
        /* 手繪感不規則邊框設計 */
        .sketch-border {
            border: 3px solid #3f3f46;
            border-radius: 2px 255px 3px 25px / 255px 5px 225px 3px;
        }
        .sketch-shadow {
            box-shadow: 4px 4px 0px 0px rgba(63, 63, 70, 1);
        }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#FFFDF7] flex flex-col items-center justify-start min-h-screen p-4 font-sans text-zinc-800">

    <div class="sketch-border sketch-shadow w-full max-w-sm relative flex flex-col h-[85vh] max-h-[700px] overflow-hidden">
        
        <div id="render-bg" class="absolute inset-0 bg-cover bg-center z-0"></div>
        
        <div class="absolute inset-0 bg-[#FFFDF7]/85 z-10"></div>

        <div class="p-5 flex-1 overflow-y-auto relative z-20">
            
            <div class="flex flex-col items-center mt-6">
                <div id="render-avatar" class="w-24 h-24 sketch-border bg-cover bg-center shadow-md"></div>
                
                <h1 id="render-name" class="text-xl font-black mt-4 text-zinc-800"></h1>
                <p id="render-title" class="text-sm font-bold mt-1 text-[#FF6B6B]"></p>
                <p id="render-bio" class="text-xs text-zinc-600 text-center mt-3 px-3 leading-relaxed"></p>
            </div>

            <div id="render-links" class="mt-6 space-y-3"></div>
        </div>

        <div class="p-4 border-t-3 border-zinc-800 bg-[#FFFDF7] relative z-20 shrink-0">
            <div class="grid grid-cols-2 gap-3">
                <button id="btn-share" class="py-2.5 sketch-border sketch-shadow font-bold text-sm bg-zinc-800 text-white active:translate-y-1 active:shadow-none transition-all">
                    分享這張名片
                </button>
                <button id="btn-close" class="py-2.5 bg-white sketch-border font-bold text-sm active:translate-y-1 transition-all">
                    關閉視窗
                </button>
            </div>
        </div>
    </div>

    <script>
        const MY_LIFF_ID = "YOUR_LIFF_ID_HERE"; 
        const MY_LIFF_URL = `https://liff.line.me/${MY_LIFF_ID}`;

        // ==========================================
        // 📝 1. 動態內容資料庫 (包含背景圖與頭像圖)
        // ==========================================
        const cardData = {
            images: {
                // 背景圖：推薦使用直式寬高比，例如 2560 x 1664 px 裁切後的直式視覺
                backgroundUrl: "https://placehold.co/800x1200/FFD1DC/3f3f46?text=Background+Image",
                // 頭像圖：推薦尺寸 800 x 800 px，避免使用綠色背景以防去背瑕疵
                avatarUrl: "https://placehold.co/800x800/FFE4B5/3f3f46?text=Avatar+Image"
            },
            profile: {
                name: "不想上班的創作者",
                title: "厭世系 / 數位貼圖設計",
                bio: "這是我逼不得已才做的名片，裡面有一些沒什麼用的連結，隨便逛逛吧。通常不太回訊息。"
            },
            links: [
                { title: "📷 追蹤我的 IG (幾乎沒發文)", url: "https://instagram.com" },
                { title: "🧵 看看 Threads (純抱怨)", url: "https://threads.net" },
                { title: "🛒 買點貼圖贊助我的咖啡錢", url: "https://store.line.me/" }
            ]
        };

        // ==========================================
        // 🖥️ 2. 渲染網頁框架邏輯
        // ==========================================
        window.onload = function() {
            renderHtmlCard();
            initializeLiff();
        };

        function renderHtmlCard() {
            // 帶入背景圖與頭像圖
            document.getElementById('render-bg').style.backgroundImage = `url('${cardData.images.backgroundUrl}')`;
            document.getElementById('render-avatar').style.backgroundImage = `url('${cardData.images.avatarUrl}')`;

            // 帶入文字
            document.getElementById('render-name').innerText = cardData.profile.name;
            document.getElementById('render-title').innerText = cardData.profile.title;
            document.getElementById('render-bio').innerText = cardData.profile.bio;

            // 生成按鈕
            const linksContainer = document.getElementById('render-links');
            cardData.links.forEach(link => {
                const a = document.createElement('a');
                a.href = link.url;
                a.target = "_blank";
                a.className = "flex justify-center w-full py-3 sketch-border text-sm font-bold text-zinc-800 bg-white/90 backdrop-blur-sm transition active:translate-y-0.5 active:bg-zinc-100";
                a.innerText = link.title;
                linksContainer.appendChild(a);
            });
        }

        // ==========================================
        // 💬 3. 動態生成 Flex Message JSON
        // ==========================================
        function initializeLiff() {
            liff.init({ liffId: MY_LIFF_ID }).then(() => {
                if (!liff.isLoggedIn()) liff.login();
                
                document.getElementById('btn-share').onclick = function() {
                    if (liff.isApiAvailable('shareTargetPicker')) {
                        shareDynamicFlexMessage();
                    } else {
                        alert("請在 LINE App 中開啟才能分享！");
                    }
                };

                document.getElementById('btn-close').onclick = function() {
                    if (liff.isInClient()) liff.closeWindow();
                };
            });
        }

        function shareDynamicFlexMessage() {
            const flexJson = {
                "type": "flex",
                "altText": `收到來自 ${cardData.profile.name} 的名片`,
                "contents": {
                    "type": "bubble",
                    "size": "mega",
                    "body": {
                        "type": "box",
                        "layout": "vertical",
                        "paddingAll": "0px",
                        "contents": [
                            // 1. 底層：全幅背景圖 (透過 position: absolute 鋪滿)
                            {
                                "type": "image",
                                "url": cardData.images.backgroundUrl,
                                "size": "full",
                                "aspectMode": "cover",
                                "aspectRatio": "3:4"
                            },
                            // 2. 上層：半透明遮罩與內容區塊
                            {
                                "type": "box",
                                "layout": "vertical",
                                "position": "absolute",
                                "width": "100%",
                                "height": "100%",
                                "backgroundColor": "#FFFDF7DD", // DD 代表 86% 不透明度的暖白色
                                "paddingAll": "25px",
                                "alignItems": "center",
                                "contents": [
                                    {
                                        "type": "image",
                                        "url": cardData.images.avatarUrl,
                                        "size": "xl",
                                        "aspectMode": "cover",
                                        "margin": "xl"
                                    },
                                    {
                                        "type": "text",
                                        "text": cardData.profile.name,
                                        "weight": "bold",
                                        "size": "xl",
                                        "color": "#3f3f46",
                                        "margin": "xl"
                                    },
                                    {
                                        "type": "text",
                                        "text": cardData.profile.title,
                                        "size": "sm",
                                        "color": "#FF6B6B",
                                        "weight": "bold",
                                        "margin": "sm"
                                    },
                                    {
                                        "type": "text",
                                        "text": cardData.profile.bio,
                                        "size": "sm",
                                        "color": "#71717a",
                                        "wrap": true,
                                        "margin": "xl",
                                        "align": "center"
                                    },
                                    // 底部按鈕推到底部
                                    {
                                        "type": "box",
                                        "layout": "vertical",
                                        "margin": "xxl",
                                        "contents": [
                                            {
                                                "type": "button",
                                                "style": "primary",
                                                "color": "#3f3f46",
                                                "action": {
                                                    "type": "uri",
                                                    "label": "勉為其難看一下",
                                                    "uri": MY_LIFF_URL
                                                }
                                            }
                                        ]
                                    }
                                ]
                            }
                        ]
                    }
                }
            };

            liff.shareTargetPicker([ flexJson ])
                .then((res) => { if (res) console.log("發送成功"); })
                .catch(err => alert("發送失敗: " + err));
        }
    </script>
</body>
</html>
