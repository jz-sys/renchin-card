        .sketch-border {
            border: 3px solid #3f3f46;
            border-radius: 2px 255px 3px 25px / 255px 5px 225px 3px;

<body class="bg-[#FFFDF7] flex flex-col items-center justify-start min-h-screen p-4 font-sans text-zinc-800">
    <div id="lightbox" class="fixed inset-0 z-50 bg-black/80 hidden flex-col items-center justify-center p-5 backdrop-blur-sm transition-opacity opacity-0" onclick="closeLightbox(event)">
        <div class="relative w-full max-w-sm bg-[#FFFDF7] sketch-border p-3 flex flex-col scale-95 transition-transform duration-200" id="lightbox-content" onclick="event.stopPropagation()">
            <button onclick="closeLightbox(event)" class="absolute -top-3 -right-3 w-10 h-10 sketch-border bg-[#FF6B6B] font-black text-white text-lg flex items-center justify-center active:translate-y-1 z-10 shadow-md">X</button>

            <p id="lightbox-desc" class="text-[13px] text-[#FF6B6B] font-bold mt-1"></p>
        </div>

    <div class="sketch-border sketch-shadow w-full max-w-sm relative flex flex-col h-[85vh] max-h-[750px] overflow-hidden">

        <div class="absolute inset-0 bg-[#FFFDF7]/85 z-10"></div>
        <div class="p-5 flex-1 overflow-y-auto relative z-20 flex flex-col">
            <div class="grid grid-cols-2 gap-2 mb-5 shrink-0">
                <button id="btn-tab-profile" onclick="switchPage('profile')" class="flex items-center justify-center gap-1.5 py-2 sketch-border bg-zinc-800 text-white font-bold text-[13px] transition-all"></button>
                <button id="btn-tab-news" onclick="switchPage('news')" class="flex items-center justify-center gap-1.5 py-2 sketch-border bg-white text-zinc-800 font-bold text-[13px] transition-all"></button>
                <button id="btn-tab-shop" onclick="switchPage('shop')" class="flex items-center justify-center gap-1.5 py-2 sketch-border bg-white text-zinc-800 font-bold text-[13px] transition-all"></button>
                <button id="btn-tab-gallery" onclick="switchPage('gallery')" class="flex items-center justify-center gap-1.5 py-2 sketch-border bg-white text-zinc-800 font-bold text-[13px] transition-all"></button>
            </div>
            <div id="page-profile" class="flex flex-col items-center">
                <div class="relative flex items-center justify-center shrink-0 w-[120px] h-[120px]">

            <div id="page-news" class="hidden flex-col w-full pb-2 space-y-4"></div>
