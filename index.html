<script>
    const MY_LIFF_ID = "2010359676-IbNfBMDD"; 
    const MY_LIFF_URL = `https://liff.line.me/${MY_LIFF_ID}`;

    // 宣告一個全域變數來準備裝 JSON 的資料
    let cardData = {};

    // ==========================================
    // 🖥️ 1. 系統初始化：先抓資料，再畫畫面
    // ==========================================
    window.onload = function() {
        // 使用 fetch 去抓取同一層目錄下的 renchincard.json
        fetch('./renchincard.json')
            .then(response => {
                // 如果找不到檔案，拋出錯誤
                if (!response.ok) {
                    throw new Error("找不到 card.json 檔案");
                }
                // 將抓回來的文字轉換成 JSON 物件
                return response.json(); 
            })
            .then(data => {
                // 將資料存入全域變數，供後續使用
                cardData = data; 
                
                // 資料準備好後，才開始渲染畫面與啟動 LINE 功能
                renderHtmlCard();
                initializeLiff();
            })
            .catch(error => {
                console.error("讀取資料失敗：", error);
                document.getElementById('render-bio').innerText = "系統發生錯誤，無法載入名片資料。";
            });
    };

    // ==========================================
    // 🖥️ 2. 渲染網頁框架邏輯 (跟之前一樣，不用改)
    // ==========================================
    function renderHtmlCard() {
        document.getElementById('render-bg').style.backgroundImage = `url('${cardData.images.backgroundUrl}')`;
        document.getElementById('render-avatar').style.backgroundImage = `url('${cardData.images.avatarUrl}')`;
        document.getElementById('render-name').innerText = cardData.profile.name;
        document.getElementById('render-title').innerText = cardData.profile.title;
        document.getElementById('render-bio').innerText = cardData.profile.bio;

        const linksContainer = document.getElementById('render-links');
        cardData.links.forEach(link => {
            const a = document.createElement('a');
            a.href = link.url;
            a.target = "_blank";
            a.className = "flex justify-center w-full py-3 sketch-border text-sm font-bold text-zinc-800 bg-white/90 backdrop-blur-sm transition active:translate-y-0.5 active:bg-zinc-100";
            a.innerText = link.title;
            linksContainer.appendChild(a);
        });
    }

    // ==========================================
    // 💬 3. 動態生成 Flex Message JSON 與 LIFF 功能
    // ==========================================
    function initializeLiff() {
        liff.init({ liffId: MY_LIFF_ID }).then(() => {
            if (!liff.isLoggedIn()) liff.login();
            
            document.getElementById('btn-share').onclick = function() {
                if (liff.isApiAvailable('shareTargetPicker')) {
                    shareDynamicFlexMessage();
                } else {
                    alert("請在 LINE App 中開啟才能分享！");
                }
            };

            document.getElementById('btn-close').onclick = function() {
                if (liff.isInClient()) liff.closeWindow();
            };
        });
    }

    // 發送 Flex Message 的邏輯 (一樣會去讀取 cardData 裡面的資料)
    function shareDynamicFlexMessage() {
        const flexJson = {
            "type": "flex",
            "altText": `收到來自 ${cardData.profile.name} 的名片`,
            "contents": {
                "type": "bubble",
                "size": "mega",
                "body": {
                    "type": "box",
                    "layout": "vertical",
                    "paddingAll": "0px",
                    "contents": [
                        {
                            "type": "image",
                            "url": cardData.images.backgroundUrl,
                            "size": "full",
                            "aspectMode": "cover",
                            "aspectRatio": "3:4"
                        },
                        {
                            "type": "box",
                            "layout": "vertical",
                            "position": "absolute",
                            "width": "100%",
                            "height": "100%",
                            "backgroundColor": "#FFFDF7DD",
                            "paddingAll": "25px",
                            "alignItems": "center",
                            "contents": [
                                {
                                    "type": "image",
                                    "url": cardData.images.avatarUrl,
                                    "size": "xl",
                                    "aspectMode": "cover",
                                    "margin": "xl"
                                },
                                {
                                    "type": "text",
                                    "text": cardData.profile.name,
                                    "weight": "bold",
                                    "size": "xl",
                                    "color": "#3f3f46",
                                    "margin": "xl"
                                },
                                {
                                    "type": "text",
                                    "text": cardData.profile.title,
                                    "size": "sm",
                                    "color": "#FF6B6B",
                                    "weight": "bold",
                                    "margin": "sm"
                                },
                                {
                                    "type": "text",
                                    "text": cardData.profile.bio,
                                    "size": "sm",
                                    "color": "#71717a",
                                    "wrap": true,
                                    "margin": "xl",
                                    "align": "center"
                                },
                                {
                                    "type": "box",
                                    "layout": "vertical",
                                    "margin": "xxl",
                                    "contents": [
                                        {
                                            "type": "button",
                                            "style": "primary",
                                            "color": "#3f3f46",
                                            "action": {
                                                "type": "uri",
                                                "label": "勉為其難看一下",
                                                "uri": MY_LIFF_URL
                                            }
                                        }
                                    ]
                                }
                            ]
                        }
                    ]
                }
            }
        };

        liff.shareTargetPicker([ flexJson ])
            .then((res) => { if (res) console.log("發送成功"); })
            .catch(err => alert("發送失敗: " + err));
    }
</script>
